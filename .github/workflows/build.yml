name: 403Cord CI/CD
on:
    push:
        branches:
            - main
        paths:
            - .github/workflows/build.yml
            - src/**
            - browser/**
            - scripts/build/**
            - package.json
            - pnpm-lock.yaml
env:
    FORCE_COLOR: true

permissions:
    contents: write

jobs:
    Build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v3

            - name: Use Node.js 20
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Lint and Test
              run: pnpm test

            - name: Build web
              run: pnpm buildWebStandalone

            - name: Build
              run: pnpm build --standalone

            - name: Generate plugin list
              run: pnpm generatePluginJson dist/plugins.json dist/plugin-readmes.json

            - name: Clean up obsolete files
              run: |
                  rm -rf dist/*-unpacked dist/vendor Vencord.user.css vencordDesktopRenderer.css vencordDesktopRenderer.css.map

            - name: Get version from package.json
              id: get_version
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  echo "version=$VERSION" >> $GITHUB_ENV

            - name: Prepare ASAR package
              run: |
                  echo 'require("./patcher.js");' > dist/index.js
                  echo '{"name":"403cord","main":"index.js"}' > dist/package.json

            - name: Package ASAR
              run: npx -y @electron/asar pack dist 403Cord.asar

            - name: Upload release
              if: github.repository == 'onlyfourhundredthree/403Cord'
              run: |
                  gh release delete "v$VERSION" --yes --cleanup-tag > /dev/null 2>&1 || true
                  gh release create "v$VERSION" 403Cord.asar \
                    --title "403Cord v$VERSION" \
                    --notes "403Cord Core Initialized" \
                    --latest
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  VERSION: ${{ env.version }}

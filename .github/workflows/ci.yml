name: 403Cord CI
on:
    push:
        branches:
            - main
    pull_request:

env:
    FORCE_COLOR: true

jobs:
    Test:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v3

            - name: Use Node.js 20
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Lint and Test
              run: pnpm test